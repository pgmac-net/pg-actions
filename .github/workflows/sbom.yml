name: SBOM Generator

# This is a start on some SBoM building, scanning and attestation.
# There are 2 pieces to this right now:
# 1. Generate a CycloneDX SBoM, make an artefact, create an attestation of said artefact and upload the SBoM to Dependency Track
# 2. Pull the artefact back down, verify it and scan it with grype, uploading the results to the Security tab as a SARIF report

# It's designed to be called from a workflow_dispatch or a workflow_call event, but can be triggered by a push to the main or master branch.
# I haven't testing calling from an external organisation workflows yet, the scanning should work, but the attestation may not.

# It's running on a self-hosted runner. You'll need to have one of those setup, running and tagged with 'self-hsoted' for this to work.

# Because I'm using the free-tier of GitHub, I only have access to GHAS for public repositories, so the attestation and SARIF upload is only done for public repositories.

# To do attestations, we need the gh cli tool. The easiest/fastest way to install this is with mise-en-place

on:
  push:
    branches: ["master", "main"]
  pull_request: # Add this for PR validation
    types: [opened, synchronize]

  workflow_dispatch:
    inputs:
      runs-on:
        description: "Runner to use for the job"
        required: false
        type: choice # Optional: use 'choice' for dropdown in UI
        options:
          - self-hosted
        default: "self-hosted"
  workflow_call:
    inputs:
      runs-on:
        description: "Runner to use for the job"
        required: false
        type: string
        default: "self-hosted"
    secrets:
      DT_HOST:
        required: true
      DT_APIKEY:
        required: true

jobs:
  DepTrack-sbom:
    runs-on: ${{ inputs.runs-on || 'self-hosted' }}
    timeout-minutes: 3
    permissions:
      id-token: write
      attestations: write
      actions: read
      contents: write
      security-events: write

    steps:
      - uses: actions/checkout@v6

      - name: Build the CycloneDX SBoM for this directory
        uses: anchore/sbom-action@v0
        with:
          path: ./
          format: cyclonedx-json
          output-file: sbom.json
          artifact-name: sbom.json
          upload-artifact: true
          dependency-snapshot: true

      - name: Build the SHA256 digest
        id: sha256
        run: |
          echo "sha256=sha256:$(sha256sum sbom.json | cut -d ' ' -f 1)" >> $GITHUB_OUTPUT

      - name: Attest the SBoM
        if: github.event.repository.visibility == 'public'
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: sbom.json
          subject-digest: ${{ steps.sha256.outputs.sha256 }}
          show-summary: true
          push-to-registry: false

      - name: Upload SBoM to Dependency Track
        uses: DependencyTrack/gh-upload-sbom@v3
        with:
          serverhostname: "${{ secrets.DT_HOST }}"
          apikey: ${{ secrets.DT_APIKEY }}
          projectname: ${{ github.repository }}
          projectversion: ${{ github.sha }}
          projecttags: ${{ github.repository }}, ${{ github.ref_type }}, ${{ github.ref}}
          bomfilename: "sbom.json"
          autocreate: true

  GHAS-dependency-scan:
    runs-on: ${{ inputs.runs-on || 'self-hosted' }}
    needs: [DepTrack-sbom]
    permissions:
      id-token: write
      attestations: write
      actions: read
      contents: write
      security-events: write

    steps:
      - uses: actions/checkout@v6

      - name: Install tools via mise
        uses: jdx/mise-action@v2

      - name: Download the SBoM Artifact
        uses: actions/download-artifact@v8.0.1
        with:
          # Name of the artifact to download. If unspecified, all artifacts for the run are downloaded.
          name: sbom.json
          merge-multiple: false

      - name: Verify the artefact attestation
        if: github.event.repository.visibility == 'public'
        run: |
          gh attestation verify ./sbom.json --owner ${{ github.repository_owner }}
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Scan the SBoM for vulnerabilities # The grype SBoM scan only scans SPDX format SBoMs
        uses: anchore/scan-action@v7
        id: scan
        with:
          sbom: sbom.json
          fail-build: false # Reporting only mode for now - change to true to fail the build
          #severity-cutoff: "medium" # Only fail the build if a vulnerability of this severity or higher is found
          only-fixed: true # Only report vulnerabilities that have a fix available
          output-format: sarif

      - name: Parse SARIF and create comment
        id: comment
        run: |
          # Extract vulnerability information from SARIF
          TOTAL=$(jq -r '.runResults[0].results | length' ${{ steps.scan.outputs.sarif }} 2>/dev/null || echo "0")

          # Parse severity levels
          CRITICAL=$(jq -r '.runResults[0].results[] | select(.level == "error") | .level' ${{ steps.scan.outputs.sarif }} 2>/dev/null | wc -l | tr -d ' ')
          HIGH=$(jq -r '.runResults[0].results[] | select(.level == "warning") | .level' ${{ steps.scan.outputs.sarif }} 2>/dev/null | wc -l | tr -d ' ')
          MEDIUM=$(jq -r '.runResults[0].results[] | select(.level == "note") | .level' ${{ steps.scan.outputs.sarif }} 2>/dev/null | wc -l | tr -d ' ')

          # Generate comment body
          echo "comment_body<<EOF" >> $GITHUB_OUTPUT
          echo "## 🛡️ SBoM Vulnerability Scan Results" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "**Scan Summary:**" >> $GITHUB_OUTPUT
          echo "- **Total vulnerabilities found:** \`${TOTAL}\`" >> $GITHUB_OUTPUT
          echo "- **Critical:** \`${CRITICAL}\`" >> $GITHUB_OUTPUT
          echo "- **High:** \`${HIGH}\`" >> $GITHUB_OUTPUT
          echo "- **Medium:** \`${MEDIUM}\`" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "**SBoM Details:**" >> $GITHUB_OUTPUT
          echo "- Generated from commit: \`${{ github.event.pull_request.head.sha }}\`" >> $GITHUB_OUTPUT
          echo "- SBoM format: CycloneDX" >> $GITHUB_OUTPUT
          echo "- Repository: \`${{ github.repository }}\`" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "📋 [View full SARIF report](https://github.com/${{ github.repository }}/security/code-scanning)" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "> ⚠️ This comment will be updated on each commit" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Find existing comment
        id: find-comment
        run: |
          echo "comment_id=$(gh pr view ${{ github.event.pull_request.number }} --json comments --jq '.comments[] | select(.body | contains("SBoM Vulnerability Scan Results")) | .id' | head -n1)" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Create or update comment
        run: |
          if [ -n "${{ steps.find-comment.outputs.comment_id }}" ]; then
            echo "Updating existing comment"
            gh pr edit ${{ github.event.pull_request.number }} --comment-id ${{ steps.find-comment.outputs.comment_id }} --body "${{ steps.comment.outputs.comment_body }}"
          else
            echo "Creating new comment"
            gh pr comment ${{ github.event.pull_request.number }} --body "${{ steps.comment.outputs.comment_body }}"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Upload SBoM scan SARIF report
        # Free-tier GHAS only works on public repositories
        if: github.event.repository.visibility == 'public'
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: ${{ steps.scan.outputs.sarif }}
